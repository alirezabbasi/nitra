<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>NITRA Charting</title>
    <script src="/static/vendor-klinecharts.min.js"></script>
    <style>
      :root {
        --bg: #131722;
        --panel: #1b2130;
        --panel-soft: #1f2638;
        --line: #2b3245;
        --text: #d1d4dc;
        --muted: #7f8697;
      }

      * {
        box-sizing: border-box;
      }

      html,
      body {
        margin: 0;
        width: 100%;
        height: 100%;
        overflow: hidden;
        background: var(--bg);
        color: var(--text);
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Ubuntu, "Helvetica Neue", Arial, sans-serif;
      }

      .app {
        width: 100%;
        height: 100%;
        display: grid;
        grid-template-rows: 40px 1fr 40px;
      }

      .topbar {
        display: flex;
        align-items: center;
        gap: 6px;
        padding: 0 8px;
        border-bottom: 1px solid var(--line);
        background: var(--panel);
      }

      .bottombar {
        display: flex;
        align-items: center;
        gap: 6px;
        padding: 0 8px;
        border-top: 1px solid var(--line);
        background: var(--panel);
        min-width: 0;
      }

      .row {
        display: flex;
        align-items: center;
        gap: 6px;
        min-width: 0;
      }

      .brand {
        font-size: 13px;
        font-weight: 700;
        letter-spacing: 0.02em;
        color: #e7ebf4;
        padding: 0 8px;
        white-space: nowrap;
      }

      .tool-group {
        display: flex;
        align-items: center;
        gap: 4px;
        min-width: 0;
      }

      .divider {
        width: 1px;
        height: 20px;
        background: var(--line);
        margin: 0 2px;
      }

      .tool-btn,
      .select,
      .num,
      .dt {
        border: 1px solid transparent;
        color: var(--muted);
        background: transparent;
        border-radius: 6px;
        height: 28px;
        min-width: 28px;
        padding: 0 8px;
        font-size: 12px;
      }

      .tool-btn {
        cursor: pointer;
      }

      .tool-btn:hover {
        background: #252d3f;
        color: var(--text);
      }

      .tool-btn.active {
        background: #27324a;
        color: #e3e7f0;
        border-color: #3a4660;
      }

      .select,
      .num,
      .dt {
        border-color: #3a4660;
        background: #27324a;
        color: #e3e7f0;
      }

      .num {
        width: 88px;
      }

      .dt {
        width: 176px;
      }

      #timeframe-select {
        width: 70px;
        min-width: 0;
      }

      #locale-select {
        width: 82px;
      }

      #timezone-select {
        width: 120px;
      }

      #zoom-anchor-select,
      #format-select {
        width: 100px;
      }

      .combo {
        position: relative;
        display: flex;
        align-items: center;
        min-width: 250px;
        max-width: 340px;
      }

      .combo .select {
        width: 100%;
        min-width: 0;
        border-top-right-radius: 0;
        border-bottom-right-radius: 0;
      }

      .combo-toggle {
        border: 1px solid #3a4660;
        border-left: 0;
        color: #e3e7f0;
        background: #27324a;
        border-top-right-radius: 6px;
        border-bottom-right-radius: 6px;
        height: 28px;
        min-width: 26px;
        cursor: pointer;
      }

      .combo-menu {
        position: absolute;
        top: calc(100% + 4px);
        left: 0;
        right: 0;
        background: #1f2638;
        border: 1px solid #3a4660;
        border-radius: 6px;
        max-height: 260px;
        overflow: auto;
        z-index: 30;
      }

      .combo-menu.hidden {
        display: none;
      }

      .combo-item {
        width: 100%;
        border: 0;
        background: transparent;
        color: #e3e7f0;
        text-align: left;
        padding: 8px 10px;
        cursor: pointer;
        font-size: 12px;
      }

      .combo-item:hover,
      .combo-item.active {
        background: #27324a;
      }

      .combo-empty {
        padding: 8px 10px;
        color: var(--muted);
        font-size: 12px;
      }

      .range-wrap {
        display: flex;
        align-items: center;
        gap: 4px;
      }

      .range-wrap input[type="range"] {
        width: 82px;
      }

      .label {
        color: var(--muted);
        font-size: 11px;
        white-space: nowrap;
      }

      .meta {
        margin-left: auto;
        color: var(--muted);
        font-size: 11px;
        white-space: nowrap;
        overflow: hidden;
        text-overflow: ellipsis;
        max-width: 46vw;
      }

      .settings-overlay {
        position: fixed;
        inset: 0;
        background: rgba(8, 11, 18, 0.68);
        z-index: 90;
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 16px;
      }

      .settings-overlay.hidden {
        display: none;
      }

      .settings-modal {
        width: min(860px, 100%);
        max-height: 82vh;
        overflow: auto;
        border: 1px solid #3a4660;
        border-radius: 10px;
        background: #182031;
        box-shadow: 0 16px 38px rgba(0, 0, 0, 0.45);
      }

      .settings-head {
        display: flex;
        align-items: center;
        justify-content: space-between;
        padding: 12px 14px;
        border-bottom: 1px solid #2f3a54;
      }

      .settings-grid {
        display: grid;
        grid-template-columns: 1fr 1.2fr;
        gap: 12px;
        padding: 12px;
      }

      .settings-card {
        border: 1px solid #2f3a54;
        border-radius: 8px;
        padding: 10px;
        background: #1d2740;
      }

      .settings-card h3 {
        margin: 0 0 8px;
        font-size: 12px;
        color: #dfe6fa;
      }

      .settings-row {
        display: flex;
        gap: 6px;
        align-items: center;
        margin-bottom: 8px;
      }

      .settings-row .select,
      .settings-row .num {
        width: 100%;
      }

      .market-table {
        width: 100%;
        border-collapse: collapse;
        font-size: 12px;
      }

      .market-table th,
      .market-table td {
        border-bottom: 1px solid #2f3a54;
        padding: 6px;
        text-align: left;
      }

      .market-table td:last-child {
        text-align: right;
      }

      .chart-wrap {
        min-height: 0;
        display: block;
        position: relative;
      }

      #kline {
        width: 100%;
        height: 100%;
      }

      @media (max-width: 1200px) {
        .brand,
        #timezone-select,
        .label,
        #left-min-bars,
        #right-min-bars,
        #jump-index {
          display: none;
        }

        .app {
          grid-template-rows: 40px 1fr 40px;
        }

        .meta {
          max-width: 30vw;
        }

        .settings-grid {
          grid-template-columns: 1fr;
        }
      }
    </style>
  </head>
  <body>
    <div class="app">
      <div class="topbar">
        <div class="brand">NITRA · KLine UX</div>
        <div class="tool-group combo" id="market-combo">
          <input id="market-search" class="select" title="Search Venue · Instrument" placeholder="Search venue/instrument" autocomplete="off" />
          <button class="combo-toggle" id="market-toggle" title="Show available markets">▼</button>
          <div id="market-dropdown" class="combo-menu hidden"></div>
        </div>
        <select id="timeframe-select" class="select" title="Timeframe">
          <option value="1m">1m</option>
          <option value="5m">5m</option>
          <option value="15m">15m</option>
          <option value="30m">30m</option>
          <option value="1h">1h</option>
          <option value="4h">4h</option>
          <option value="1d">1d</option>
        </select>
        <select id="locale-select" class="select" title="Locale">
          <option value="en-US">en-US</option>
          <option value="zh-CN">zh-CN</option>
        </select>
        <select id="timezone-select" class="select" title="Timezone">
          <option value="UTC">UTC</option>
          <option value="Asia/Tehran">Asia/Tehran</option>
          <option value="America/New_York">America/New_York</option>
          <option value="Europe/London">Europe/London</option>
        </select>
        <button class="tool-btn" id="reload-btn">Reload</button>
        <button class="tool-btn" id="fit-btn">Fit</button>
        <button class="tool-btn" id="realtime-btn" title="Back to current candle">Current</button>
        <button class="tool-btn" id="snapshot-btn">Snapshot</button>
        <button class="tool-btn" id="backfill-btn">Backfill 90d</button>
        <button class="tool-btn" id="settings-btn" title="Venue and ingestion settings">⚙ Settings</button>
        <div id="status" class="meta">Loading...</div>
      </div>

      <section class="chart-wrap">
        <div id="kline"></div>
      </section>

      <div class="bottombar">
        <button class="tool-btn" id="lock-scroll-btn" title="Toggle chart panning">Scroll: On</button>
        <button class="tool-btn" id="lock-zoom-btn" title="Toggle chart zooming">Zoom: On</button>
        <select id="zoom-anchor-select" class="select" title="Zoom anchor">
          <option value="cursor">Anchor: Cursor</option>
          <option value="last_bar">Anchor: Last Bar</option>
        </select>
        <select id="format-select" class="select" title="Number formatting">
          <option value="compact">Format: Compact</option>
          <option value="raw">Format: Raw</option>
        </select>
        <div class="range-wrap">
          <span class="label">Bar</span>
          <input id="bar-space-range" type="range" min="1" max="50" step="1" value="8" />
        </div>
        <div class="range-wrap">
          <span class="label">Right</span>
          <input id="right-offset-range" type="range" min="0" max="240" step="2" value="24" />
        </div>
        <span class="label">L/R min</span>
        <input id="left-min-bars" class="num" type="number" min="0" step="1" value="2" />
        <input id="right-min-bars" class="num" type="number" min="0" step="1" value="2" />
        <input id="jump-timestamp" class="dt" type="datetime-local" title="Jump to timestamp" />
        <button class="tool-btn" id="jump-time-btn">Jump Time</button>
        <input id="jump-index" class="num" type="number" step="1" placeholder="Data index" title="Jump to data index" />
        <button class="tool-btn" id="jump-index-btn">Jump Index</button>
        <div id="meta" class="meta">range:- | cursor:-</div>
      </div>
    </div>

    <div id="settings-overlay" class="settings-overlay hidden">
      <div class="settings-modal">
        <div class="settings-head">
          <strong>Venue Settings</strong>
          <button class="tool-btn" id="settings-close-btn">Close</button>
        </div>
        <div class="settings-grid">
          <section class="settings-card">
            <h3>Add Venue</h3>
            <div class="settings-row">
              <input id="new-venue-input" class="select" placeholder="oanda / capital / coinbase" />
              <button class="tool-btn" id="add-venue-btn">Add</button>
            </div>
            <h3>Add Market</h3>
            <div class="settings-row">
              <select id="settings-venue-select" class="select"></select>
            </div>
            <div class="settings-row">
              <input id="new-market-symbol-input" class="select" placeholder="EURUSD, BTCUSD..." />
            </div>
            <div class="settings-row">
              <select id="new-market-asset-select" class="select">
                <option value="fx">fx</option>
                <option value="crypto">crypto</option>
                <option value="other">other</option>
              </select>
              <button class="tool-btn" id="add-market-btn">Save Market</button>
            </div>
          </section>
          <section class="settings-card">
            <h3>Venue Markets</h3>
            <table class="market-table">
              <thead>
                <tr>
                  <th>Symbol</th>
                  <th>Class</th>
                  <th>Bars</th>
                  <th>Action</th>
                </tr>
              </thead>
              <tbody id="settings-market-rows"></tbody>
            </table>
          </section>
        </div>
      </div>
    </div>

    <script>
      const marketSearchEl = document.getElementById("market-search");
      const marketToggleEl = document.getElementById("market-toggle");
      const marketDropdownEl = document.getElementById("market-dropdown");
      const marketComboEl = document.getElementById("market-combo");

      const statusEl = document.getElementById("status");
      const metaEl = document.getElementById("meta");

      const reloadBtn = document.getElementById("reload-btn");
      const fitBtn = document.getElementById("fit-btn");
      const realtimeBtn = document.getElementById("realtime-btn");
      const snapshotBtn = document.getElementById("snapshot-btn");
      const backfillBtn = document.getElementById("backfill-btn");
      const settingsBtn = document.getElementById("settings-btn");
      const settingsOverlayEl = document.getElementById("settings-overlay");
      const settingsCloseBtn = document.getElementById("settings-close-btn");
      const newVenueInputEl = document.getElementById("new-venue-input");
      const addVenueBtn = document.getElementById("add-venue-btn");
      const settingsVenueSelectEl = document.getElementById("settings-venue-select");
      const newMarketSymbolInputEl = document.getElementById("new-market-symbol-input");
      const newMarketAssetSelectEl = document.getElementById("new-market-asset-select");
      const addMarketBtn = document.getElementById("add-market-btn");
      const settingsMarketRowsEl = document.getElementById("settings-market-rows");

      const timeframeSelectEl = document.getElementById("timeframe-select");
      const localeSelectEl = document.getElementById("locale-select");
      const timezoneSelectEl = document.getElementById("timezone-select");
      const zoomAnchorSelectEl = document.getElementById("zoom-anchor-select");
      const formatSelectEl = document.getElementById("format-select");

      const lockScrollBtn = document.getElementById("lock-scroll-btn");
      const lockZoomBtn = document.getElementById("lock-zoom-btn");

      const barSpaceRangeEl = document.getElementById("bar-space-range");
      const rightOffsetRangeEl = document.getElementById("right-offset-range");
      const leftMinBarsEl = document.getElementById("left-min-bars");
      const rightMinBarsEl = document.getElementById("right-min-bars");

      const jumpTimeEl = document.getElementById("jump-timestamp");
      const jumpTimeBtn = document.getElementById("jump-time-btn");
      const jumpIndexEl = document.getElementById("jump-index");
      const jumpIndexBtn = document.getElementById("jump-index-btn");
      const UI_PREFS_KEY = "nitra.chart.ui_prefs.v1";

      const state = {
        timeframe: "1m",
        locale: "en-US",
        timezone: "UTC",
        zoomAnchor: "cursor",
        formatMode: "compact",
        markets: [],
        selected: null,
        preferredMarket: null,
        comboOpen: false,
        persistedBars: [],
        liveBars: [],
        liveCursorMs: null,
        liveTimer: null,
        liveInFlight: false,
        autoFollowRealtime: true,
        scrollEnabled: true,
        zoomEnabled: true,
        barSpace: 8,
        rightOffset: 24,
        leftMinBars: 2,
        rightMinBars: 2,
        hasMoreHistory: true,
        historyLoading: false,
        lazyLoadDebounce: null,
        derivedFromOneMinute: false,
        visibleFromIndex: null,
        visibleToIndex: null,
        manualPriceRange: null,
        rangeMode: "auto",
        rangeApplying: false,
        paneIds: [],
        settingsVenues: [],
        settingsMarkets: [],
      };

      let chart = null;

      function setStatus(text) {
        statusEl.textContent = text;
      }

      function hasSelectOption(selectEl, value) {
        return Array.from(selectEl.options || []).some((opt) => opt.value === value);
      }

      function loadUiPrefs() {
        try {
          const raw = localStorage.getItem(UI_PREFS_KEY);
          if (!raw) return null;
          const parsed = JSON.parse(raw);
          if (!parsed || typeof parsed !== "object") return null;
          return parsed;
        } catch (_error) {
          return null;
        }
      }

      function persistUiPrefs() {
        try {
          const payload = {
            timeframe: state.timeframe,
            locale: state.locale,
            timezone: state.timezone,
            zoomAnchor: state.zoomAnchor,
            formatMode: state.formatMode,
            market:
              state.selected && state.selected.venue && state.selected.symbol
                ? { venue: state.selected.venue, symbol: state.selected.symbol }
                : null,
          };
          localStorage.setItem(UI_PREFS_KEY, JSON.stringify(payload));
        } catch (_error) {
          // ignore storage errors (privacy mode, quota, etc.)
        }
      }

      function applyUiPrefs() {
        const prefs = loadUiPrefs();
        if (!prefs) return;

        if (typeof prefs.timeframe === "string" && hasSelectOption(timeframeSelectEl, prefs.timeframe)) {
          state.timeframe = prefs.timeframe;
          timeframeSelectEl.value = prefs.timeframe;
        }
        if (typeof prefs.locale === "string" && hasSelectOption(localeSelectEl, prefs.locale)) {
          state.locale = prefs.locale;
          localeSelectEl.value = prefs.locale;
        }
        if (typeof prefs.timezone === "string" && hasSelectOption(timezoneSelectEl, prefs.timezone)) {
          state.timezone = prefs.timezone;
          timezoneSelectEl.value = prefs.timezone;
        }
        if (typeof prefs.zoomAnchor === "string" && hasSelectOption(zoomAnchorSelectEl, prefs.zoomAnchor)) {
          state.zoomAnchor = prefs.zoomAnchor;
          zoomAnchorSelectEl.value = prefs.zoomAnchor;
        }
        if (typeof prefs.formatMode === "string" && hasSelectOption(formatSelectEl, prefs.formatMode)) {
          state.formatMode = prefs.formatMode;
          formatSelectEl.value = prefs.formatMode;
        }
        if (prefs.market && typeof prefs.market.venue === "string" && typeof prefs.market.symbol === "string") {
          state.preferredMarket = {
            venue: prefs.market.venue,
            symbol: prefs.market.symbol,
          };
        }
      }

      function syncRealtimeButtonState() {
        if (state.autoFollowRealtime) {
          realtimeBtn.classList.add("active");
          realtimeBtn.title = "Following current candle";
        } else {
          realtimeBtn.classList.remove("active");
          realtimeBtn.title = "Back to current candle";
        }
      }

      function compactNumber(value) {
        if (!Number.isFinite(value)) return String(value);
        if (Math.abs(value) < 1000) return `${value}`;
        if (Math.abs(value) < 1_000_000) return `${(value / 1000).toFixed(2)}K`;
        if (Math.abs(value) < 1_000_000_000) return `${(value / 1_000_000).toFixed(2)}M`;
        return `${(value / 1_000_000_000).toFixed(2)}B`;
      }

      function inferPricePrecision(samplePrice, symbol) {
        const upper = String(symbol || "").toUpperCase();
        if (upper.endsWith("JPY")) {
          return 3;
        }
        const p = Math.abs(Number(samplePrice));
        if (!Number.isFinite(p) || p <= 0) {
          return 5;
        }
        if (p >= 10000) return 2;
        if (p >= 1000) return 2;
        if (p >= 100) return 3;
        if (p >= 1) return 5;
        if (p >= 0.1) return 6;
        return 8;
      }

      function applySymbolPrecision() {
        if (!chart) return;
        if (!state.selected || !state.liveBars.length) {
          return;
        }
        const last = state.liveBars[state.liveBars.length - 1];
        const samplePrice = Number(last?.close);
        const pricePrecision = inferPricePrecision(samplePrice, state.selected.symbol);
        if (typeof chart.setPriceVolumePrecision === "function") {
          chart.setPriceVolumePrecision(pricePrecision, 2);
          return;
        }
        if (typeof chart.setSymbol === "function") {
          chart.setSymbol({
            ticker: `${state.selected.venue}:${state.selected.symbol}`,
            pricePrecision,
            volumePrecision: 2,
          });
        }
      }

      function initChart() {
        if (!window.klinecharts || typeof window.klinecharts.init !== "function") {
          setStatus("Chart library failed to load");
          return false;
        }

        chart = window.klinecharts.init("kline", {
          locale: state.locale,
          timezone: state.timezone,
          zoomAnchor: state.zoomAnchor,
          styles: {
            grid: {
              horizontal: { color: "#2a3041" },
              vertical: { color: "#2a3041" },
            },
            candle: {
              type: "candle_solid",
              candle: {
                priceMark: {
                  high: { text: { color: "#cad4ea" } },
                  low: { text: { color: "#cad4ea" } },
                },
              },
              bar: {
                upColor: "#26a69a",
                downColor: "#ef5350",
                upBorderColor: "#26a69a",
                downBorderColor: "#ef5350",
                upWickColor: "#26a69a",
                downWickColor: "#ef5350",
              },
            },
            xAxis: {
              axisLine: { color: "#3c4357" },
              tickText: { color: "#8f98aa" },
            },
            yAxis: {
              axisLine: { color: "#3c4357" },
              tickText: { color: "#8f98aa" },
            },
            separator: {
              color: "#2c3244",
            },
            crosshair: {
              horizontal: { line: { color: "#7583a5" }, text: { backgroundColor: "#414c69" } },
              vertical: { line: { color: "#7583a5" }, text: { backgroundColor: "#414c69" } },
            },
          },
        });

        applyChartPreferences();
        applyFormatting();
        refreshPaneIds();
        subscribeChartActions();
        return true;
      }

      function replaceChartData(bars) {
        if (!chart) return false;
        if (typeof chart.applyNewData === "function") {
          chart.applyNewData(bars);
          return true;
        }
        if (typeof chart.setData === "function") {
          chart.setData(bars);
          return true;
        }
        return false;
      }

      function barsEqual(a, b) {
        if (!a || !b) return false;
        return (
          a.timestamp === b.timestamp &&
          a.open === b.open &&
          a.high === b.high &&
          a.low === b.low &&
          a.close === b.close &&
          Number(a.volume || 0) === Number(b.volume || 0)
        );
      }

      function updateChartDataIncremental(previousBars, nextBars) {
        if (!chart) return false;
        if (typeof chart.updateData !== "function") {
          return replaceChartData(nextBars);
        }
        if (!previousBars.length || nextBars.length < previousBars.length) {
          return replaceChartData(nextBars);
        }

        const prevLast = previousBars[previousBars.length - 1];
        const nextLast = nextBars[nextBars.length - 1];
        if (!prevLast || !nextLast) {
          return replaceChartData(nextBars);
        }

        const updates = [];
        if (nextBars.length === previousBars.length) {
          if (!barsEqual(prevLast, nextLast)) {
            updates.push(nextLast);
          }
        } else {
          const start = Math.max(0, previousBars.length - 1);
          for (let i = start; i < nextBars.length; i += 1) {
            updates.push(nextBars[i]);
          }
        }

        if (!updates.length) {
          return true;
        }

        for (const bar of updates) {
          chart.updateData(bar);
        }
        return true;
      }

      function applyChartPreferences() {
        if (!chart) return;
        if (typeof chart.setZoomAnchor === "function") {
          chart.setZoomAnchor(state.zoomAnchor);
        }
        if (typeof chart.setBarSpace === "function") {
          chart.setBarSpace(state.barSpace);
        }
        if (typeof chart.setOffsetRightDistance === "function") {
          chart.setOffsetRightDistance(state.rightOffset);
        }
        if (typeof chart.setLeftMinVisibleBarCount === "function") {
          chart.setLeftMinVisibleBarCount(state.leftMinBars);
        }
        if (typeof chart.setRightMinVisibleBarCount === "function") {
          chart.setRightMinVisibleBarCount(state.rightMinBars);
        }
        if (typeof chart.setScrollEnabled === "function") {
          chart.setScrollEnabled(state.scrollEnabled);
        }
        if (typeof chart.setZoomEnabled === "function") {
          chart.setZoomEnabled(state.zoomEnabled);
        }
        if (typeof chart.setLocale === "function") {
          chart.setLocale(state.locale);
        }
        if (typeof chart.setTimezone === "function") {
          chart.setTimezone(state.timezone);
        }
        lockScrollBtn.textContent = `Scroll: ${state.scrollEnabled ? "On" : "Off"}`;
        lockZoomBtn.textContent = `Zoom: ${state.zoomEnabled ? "On" : "Off"}`;
      }

      function applyFormatting() {
        if (!chart || typeof chart.setFormatter !== "function") {
          return;
        }
        if (state.formatMode === "raw") {
          chart.setFormatter({
            formatBigNumber: (v) => `${v}`,
          });
          return;
        }

        chart.setFormatter({
          formatBigNumber: (v) => compactNumber(Number(v)),
        });
      }

      function formatMarket(market) {
        return `${market.symbol} · ${market.venue.toUpperCase()}`;
      }

      function timeframeToMs(tf) {
        const m = /^(\d+)([mhd])$/.exec(tf || "");
        if (!m) return 60_000;
        const value = Number(m[1]);
        const unit = m[2];
        if (unit === "m") return value * 60_000;
        if (unit === "h") return value * 3_600_000;
        if (unit === "d") return value * 86_400_000;
        return 60_000;
      }

      function bucketStartMs(tsMs, tfMs) {
        return Math.floor(tsMs / tfMs) * tfMs;
      }

      function aggregateBarsFromLowerTf(bars, targetTf) {
        if (!bars.length || targetTf === "1m") {
          return bars.map((b) => ({ ...b }));
        }
        const tfMs = timeframeToMs(targetTf);
        const grouped = [];
        let current = null;

        for (const bar of bars) {
          const bucketTs = bucketStartMs(bar.timestamp, tfMs);
          if (!current || current.timestamp !== bucketTs) {
            if (current) grouped.push(current);
            current = {
              timestamp: bucketTs,
              open: bar.open,
              high: bar.high,
              low: bar.low,
              close: bar.close,
              volume: Number(bar.volume || 0),
            };
            continue;
          }

          current.high = Math.max(current.high, bar.high);
          current.low = Math.min(current.low, bar.low);
          current.close = bar.close;
          current.volume += Number(bar.volume || 0);
        }

        if (current) grouped.push(current);
        return grouped;
      }

      function extractVisibleRange(payload) {
        const source = payload || (chart && typeof chart.getVisibleRange === "function" ? chart.getVisibleRange() : null);
        if (!source || typeof source !== "object") {
          return { fromIndex: null, toIndex: null };
        }
        const fromIndex = source.from ?? source.fromIndex ?? source.realFrom ?? source.displayFrom ?? null;
        const toIndex = source.to ?? source.toIndex ?? source.realTo ?? source.displayTo ?? null;
        return { fromIndex, toIndex };
      }

      function isNearRealtimeEdge(payload = null) {
        if (!state.liveBars.length) return true;
        const { toIndex } = extractVisibleRange(payload);
        if (!Number.isFinite(Number(toIndex))) {
          return state.autoFollowRealtime;
        }
        const rightMost = state.liveBars.length - 1;
        return Number(toIndex) >= rightMost - 2;
      }

      function syncMeta(payload = null) {
        const { fromIndex, toIndex } = extractVisibleRange(payload);
        state.visibleFromIndex = Number.isFinite(Number(fromIndex)) ? Number(fromIndex) : null;
        state.visibleToIndex = Number.isFinite(Number(toIndex)) ? Number(toIndex) : null;
        const left = Number.isFinite(Number(fromIndex)) ? Number(fromIndex) : "-";
        const right = Number.isFinite(Number(toIndex)) ? Number(toIndex) : "-";
        const follow = state.autoFollowRealtime ? "follow:on" : "follow:off";
        metaEl.textContent = `range:${left}..${right} | bars:${state.liveBars.length} | ${follow}`;
        if (state.rangeMode === "auto") {
          setYAxisRangeFromBars(getVisibleBarsOrAll(), "auto");
        }
      }

      function buildRangePayload(from, to) {
        const range = to - from;
        return {
          from,
          to,
          range,
          realFrom: from,
          realTo: to,
          realRange: range,
          displayFrom: from,
          displayTo: to,
          displayRange: range,
        };
      }

      function refreshPaneIds() {
        if (!chart || typeof chart.getPaneOptions !== "function") {
          state.paneIds = [];
          return;
        }
        const options = chart.getPaneOptions();
        const ids = [];
        if (Array.isArray(options)) {
          for (const pane of options) {
            if (pane && typeof pane.id === "string" && pane.id.trim()) {
              ids.push(pane.id);
            }
          }
        } else if (options && typeof options.id === "string" && options.id.trim()) {
          ids.push(options.id);
        }
        state.paneIds = Array.from(new Set(ids));
      }

      function applyManualYAxisRange() {
        if (!chart || typeof chart.setPaneOptions !== "function") {
          return;
        }
        refreshPaneIds();
        const createRange = (params) => {
          if (state.manualPriceRange) {
            return buildRangePayload(state.manualPriceRange.from, state.manualPriceRange.to);
          }
          // No manual override: let library compute auto range from current instrument data.
          return undefined;
        };

        const targetIds = state.paneIds.length ? state.paneIds : ["candle_pane"];
        for (const paneId of targetIds) {
          chart.setPaneOptions({
            id: paneId,
            axisOptions: { createRange, gap: { top: 0.06, bottom: 0.06 } },
          });
          chart.setPaneOptions({
            id: paneId,
            axis: { createRange, gap: { top: 0.06, bottom: 0.06 } },
          });
        }
        chart.setPaneOptions({
          axisOptions: { createRange, gap: { top: 0.06, bottom: 0.06 } },
        });
        chart.setPaneOptions({
          axis: { createRange, gap: { top: 0.06, bottom: 0.06 } },
        });
      }

      function clearManualYAxisRange() {
        state.manualPriceRange = null;
        state.rangeMode = "auto";
        if (!chart || typeof chart.setPaneOptions !== "function") {
          return;
        }
        refreshPaneIds();
        const targetIds = state.paneIds.length ? state.paneIds : ["candle_pane"];
        for (const paneId of targetIds) {
          chart.setPaneOptions({
            id: paneId,
            axisOptions: { createRange: undefined },
          });
          chart.setPaneOptions({
            id: paneId,
            axis: { createRange: undefined },
          });
        }
        chart.setPaneOptions({
          axisOptions: { createRange: undefined },
        });
        chart.setPaneOptions({
          axis: { createRange: undefined },
        });
      }

      function computePriceRangeFromBars(bars) {
        if (!bars || !bars.length) {
          return null;
        }
        let low = Number.POSITIVE_INFINITY;
        let high = Number.NEGATIVE_INFINITY;
        for (const bar of bars) {
          low = Math.min(low, Number(bar.low));
          high = Math.max(high, Number(bar.high));
        }
        if (!Number.isFinite(low) || !Number.isFinite(high)) {
          return null;
        }
        if (high <= low) {
          const mid = (high + low) / 2;
          const span = Math.max(Math.abs(mid) * 0.01, 1e-6);
          low = mid - span;
          high = mid + span;
        }
        const pad = (high - low) * 0.08;
        return {
          from: low - pad,
          to: high + pad,
        };
      }

      function setYAxisRangeFromBars(bars, mode = "auto") {
        if (state.rangeApplying) {
          return;
        }
        const range = computePriceRangeFromBars(bars);
        if (!range) {
          return;
        }
        state.rangeApplying = true;
        state.manualPriceRange = range;
        state.rangeMode = mode;
        applyManualYAxisRange();
        state.rangeApplying = false;
      }

      function getVisibleBarsOrAll() {
        if (!state.liveBars.length) {
          return [];
        }
        const from = state.visibleFromIndex;
        const to = state.visibleToIndex;
        if (Number.isFinite(from) && Number.isFinite(to)) {
          const left = Math.max(0, Math.floor(Math.min(from, to)));
          const right = Math.min(state.liveBars.length - 1, Math.ceil(Math.max(from, to)));
          if (right >= left) {
            return state.liveBars.slice(left, right + 1);
          }
        }
        return state.liveBars;
      }

      function fitVisibleCandlesVertically() {
        if (!state.liveBars.length) {
          return;
        }
        const from = state.visibleFromIndex;
        const to = state.visibleToIndex;
        let visibleBars = state.liveBars;
        if (Number.isFinite(from) && Number.isFinite(to)) {
          const left = Math.max(0, Math.floor(Math.min(from, to)));
          const right = Math.min(state.liveBars.length - 1, Math.ceil(Math.max(from, to)));
          if (right >= left) {
            visibleBars = state.liveBars.slice(left, right + 1);
          }
        }
        if (!visibleBars.length) {
          return;
        }

        setYAxisRangeFromBars(visibleBars, "visible");
        fitChart();
        setStatus("Price axis fit to visible candle range");
      }

      function fitChart() {
        if (!chart) return;
        if (typeof chart.resize === "function") chart.resize();
        syncMeta();
      }

      function stopLivePolling() {
        if (state.liveTimer) {
          clearInterval(state.liveTimer);
          state.liveTimer = null;
        }
        state.liveInFlight = false;
      }

      function mergeBarsWithTicks(baseBars, ticks, tfMs, persistedLastTs) {
        const bars = baseBars.map((b) => ({ ...b }));
        if (!ticks.length) return bars;

        for (const tick of ticks) {
          const tickTs = Number(tick.ts_ms);
          const price = Number(tick.price);
          if (!Number.isFinite(tickTs) || !Number.isFinite(price)) continue;

          const bucketTs = bucketStartMs(tickTs, tfMs);
          if (persistedLastTs !== null && bucketTs < persistedLastTs) continue;

          if (!bars.length) {
            bars.push({ timestamp: bucketTs, open: price, high: price, low: price, close: price, volume: 0 });
            continue;
          }

          const last = bars[bars.length - 1];
          if (bucketTs < last.timestamp) continue;

          if (bucketTs === last.timestamp) {
            last.high = Math.max(last.high, price);
            last.low = Math.min(last.low, price);
            last.close = price;
            continue;
          }

          bars.push({
            timestamp: bucketTs,
            open: last.close,
            high: Math.max(last.close, price),
            low: Math.min(last.close, price),
            close: price,
            volume: 0,
          });
        }

        return bars;
      }

      async function pollLiveTicks() {
        if (!state.selected || !chart || state.liveInFlight) return;

        state.liveInFlight = true;
        try {
          const params = new URLSearchParams({
            venue: state.selected.venue,
            symbol: state.selected.symbol,
            limit: "2000",
          });

          if (state.liveCursorMs !== null) params.set("since_ms", String(state.liveCursorMs));

          const payload = await getJson(`/api/v1/ticks/hot?${params.toString()}`);
          const ticks = payload.ticks || [];
          if (!ticks.length) return;

          state.liveCursorMs = Number(ticks[ticks.length - 1].ts_ms);
          const tfMs = timeframeToMs(state.timeframe);
          const persistedLastTs = state.persistedBars.length ? state.persistedBars[state.persistedBars.length - 1].timestamp : null;

          const previousBars = state.liveBars;
          state.liveBars = mergeBarsWithTicks(state.liveBars, ticks, tfMs, persistedLastTs);
          if (updateChartDataIncremental(previousBars, state.liveBars)) {
            if (state.rangeMode === "auto" && state.autoFollowRealtime && state.manualPriceRange) {
              const last = state.liveBars[state.liveBars.length - 1];
              const outOfRange =
                last &&
                (last.low < state.manualPriceRange.from || last.high > state.manualPriceRange.to);
              if (outOfRange) {
                setYAxisRangeFromBars(state.liveBars, "auto");
              }
            }
            if (state.autoFollowRealtime && typeof chart.scrollToRealTime === "function") {
              chart.scrollToRealTime(80);
            }
            syncMeta();
            setStatus(`live ticks:${ticks.length} · ${new Date().toLocaleTimeString()}`);
          }
        } catch (error) {
          setStatus(`Live error: ${error.message}`);
        } finally {
          state.liveInFlight = false;
        }
      }

      function startLivePolling() {
        stopLivePolling();
        pollLiveTicks();
        state.liveTimer = setInterval(pollLiveTicks, 1000);
      }

      async function getJson(url) {
        const response = await fetch(url);
        if (!response.ok) throw new Error(`HTTP ${response.status}`);
        return response.json();
      }

      async function fetchBars(venue, symbol, timeframe, limit) {
        const params = new URLSearchParams({
          venue,
          symbol,
          timeframe,
          limit: String(limit),
        });
        const payload = await getJson(`/api/v1/bars/hot?${params.toString()}`);
        return (payload.bars || []).map((b) => ({
          timestamp: Number(b.time) * 1000,
          open: Number(b.open),
          high: Number(b.high),
          low: Number(b.low),
          close: Number(b.close),
          volume: Number(b.volume || 0),
        }));
      }

      async function fetchHistoryBars(venue, symbol, timeframe, beforeTimestampMs, limit = 500) {
        const params = new URLSearchParams({
          venue,
          symbol,
          timeframe,
          before_s: String(Math.floor(beforeTimestampMs / 1000)),
          limit: String(limit),
        });
        const payload = await getJson(`/api/v1/bars/history?${params.toString()}`);
        const bars = (payload.bars || []).map((b) => ({
          timestamp: Number(b.time) * 1000,
          open: Number(b.open),
          high: Number(b.high),
          low: Number(b.low),
          close: Number(b.close),
          volume: Number(b.volume || 0),
        }));
        return { bars, hasMore: Boolean(payload.has_more) };
      }

      async function loadOlderBarsIfNeeded(rangePayload = null) {
        if (!state.selected || state.historyLoading || !state.hasMoreHistory) return;

        const { fromIndex } = extractVisibleRange(rangePayload);
        if (!Number.isFinite(Number(fromIndex)) || Number(fromIndex) > 28) return;
        if (!state.liveBars.length) return;

        state.historyLoading = true;
        try {
          const beforeMs = state.liveBars[0].timestamp;
          const result = await fetchHistoryBars(state.selected.venue, state.selected.symbol, state.timeframe, beforeMs, 600);
          const older = result.bars;
          if (!older.length) {
            state.hasMoreHistory = false;
            return;
          }

          const firstTs = state.liveBars[0].timestamp;
          const dedupOlder = older.filter((b) => b.timestamp < firstTs);
          if (!dedupOlder.length) {
            state.hasMoreHistory = result.hasMore;
            return;
          }

          state.persistedBars = [...dedupOlder, ...state.persistedBars];
          state.liveBars = [...dedupOlder, ...state.liveBars];
          replaceChartData(state.liveBars);
          if (state.rangeMode === "auto") {
            setYAxisRangeFromBars(state.liveBars, "auto");
          }
          state.hasMoreHistory = result.hasMore;
          syncMeta();
          setStatus(`history +${dedupOlder.length} candles`);
        } catch (error) {
          setStatus(`History load error: ${error.message}`);
        } finally {
          state.historyLoading = false;
        }
      }

      function setActiveTimeframe(tf) {
        state.timeframe = tf;
        timeframeSelectEl.value = tf;
        persistUiPrefs();
      }

      function getSelectedMarket(venue, symbol) {
        return state.markets.find((m) => m.venue === venue && m.symbol === symbol) || null;
      }

      function openMarketDropdown(showAll = false) {
        if (!state.markets.length) {
          marketDropdownEl.classList.add("hidden");
          state.comboOpen = false;
          return;
        }
        state.comboOpen = true;
        marketDropdownEl.classList.remove("hidden");
        renderMarketDropdown(showAll ? "" : marketSearchEl.value);
      }

      function closeMarketDropdown() {
        state.comboOpen = false;
        marketDropdownEl.classList.add("hidden");
      }

      function filterMarkets(queryText) {
        const query = (queryText || "").trim().toLowerCase();
        const markets = [...state.markets].sort((a, b) => {
          const s = a.symbol.localeCompare(b.symbol);
          if (s !== 0) return s;
          return a.venue.localeCompare(b.venue);
        });
        if (!query) return markets;
        return markets.filter((m) => formatMarket(m).toLowerCase().includes(query));
      }

      function selectMarket(market) {
        state.selected = market;
        marketSearchEl.value = formatMarket(market);
        persistUiPrefs();
      }

      function renderMarketDropdown(queryText = "") {
        marketDropdownEl.innerHTML = "";
        const filtered = filterMarkets(queryText);
        if (!filtered.length) {
          const empty = document.createElement("div");
          empty.className = "combo-empty";
          empty.textContent = "No matching market";
          marketDropdownEl.appendChild(empty);
          return;
        }

        for (const market of filtered) {
          const btn = document.createElement("button");
          btn.type = "button";
          btn.className = "combo-item";
          if (state.selected && state.selected.venue === market.venue && state.selected.symbol === market.symbol) {
            btn.classList.add("active");
          }
          btn.textContent = formatMarket(market);
          btn.addEventListener("click", async () => {
            selectMarket(market);
            closeMarketDropdown();
            await loadBars();
            startLivePolling();
          });
          marketDropdownEl.appendChild(btn);
        }
      }

      function renderMarketSelector() {
        if (!state.markets.length) {
          marketSearchEl.value = "";
          marketSearchEl.placeholder = "No market";
          state.selected = null;
          closeMarketDropdown();
          return;
        }

        marketSearchEl.placeholder = "Search venue/instrument";
        const filteredAll = filterMarkets("");
        const existing = state.selected ? getSelectedMarket(state.selected.venue, state.selected.symbol) : null;
        const preferred =
          !existing && state.preferredMarket
            ? getSelectedMarket(state.preferredMarket.venue, state.preferredMarket.symbol)
            : null;
        state.selected = existing || preferred || filteredAll[0];
        state.preferredMarket = null;
        marketSearchEl.value = state.selected ? formatMarket(state.selected) : "";
        persistUiPrefs();
        if (state.comboOpen) renderMarketDropdown(marketSearchEl.value);
      }

      function selectedMarketFromInput() {
        const label = marketSearchEl.value.trim().toLowerCase();
        if (!label) return null;
        const matches = state.markets.filter((m) => formatMarket(m).toLowerCase() === label);
        return matches[0] || null;
      }

      function normalizeVenueInput(raw) {
        return String(raw || "")
          .trim()
          .toLowerCase();
      }

      function normalizeSymbolInput(raw) {
        return String(raw || "")
          .trim()
          .toUpperCase()
          .replace(/[^A-Z0-9]/g, "");
      }

      async function fetchVenueList() {
        const payload = await getJson("/api/v1/venues");
        return Array.isArray(payload.venues) ? payload.venues : [];
      }

      async function fetchVenueMarkets(venue) {
        const payload = await getJson(`/api/v1/venues/${encodeURIComponent(venue)}/markets`);
        return Array.isArray(payload.markets) ? payload.markets : [];
      }

      function renderSettingsVenues() {
        settingsVenueSelectEl.innerHTML = "";
        for (const venue of state.settingsVenues) {
          const option = document.createElement("option");
          option.value = venue;
          option.textContent = venue;
          settingsVenueSelectEl.appendChild(option);
        }
      }

      function renderSettingsMarkets() {
        settingsMarketRowsEl.innerHTML = "";
        if (!state.settingsMarkets.length) {
          const row = document.createElement("tr");
          row.innerHTML = `<td colspan="4" style="color:#9aa6c3;">No markets configured</td>`;
          settingsMarketRowsEl.appendChild(row);
          return;
        }

        for (const market of state.settingsMarkets) {
          const row = document.createElement("tr");
          row.innerHTML = `
            <td>${market.symbol}</td>
            <td>${market.asset_class || "-"}</td>
            <td>${Number(market.bar_count || 0)}</td>
            <td>
              <button class="tool-btn start-ingest-btn">Start</button>
              <button class="tool-btn use-market-btn">Use</button>
            </td>
          `;

          row.querySelector(".start-ingest-btn").addEventListener("click", async () => {
            try {
              await fetch("/api/v1/ingestion/start", {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({ venue: market.venue, symbol: market.symbol }),
              });
              setStatus(`Ingestion enabled for ${market.symbol} · ${market.venue}`);
              await refreshSettingsMarkets();
              await loadMarkets();
            } catch (error) {
              setStatus(`Ingestion start failed: ${error.message}`);
            }
          });

          row.querySelector(".use-market-btn").addEventListener("click", async () => {
            const selected = getSelectedMarket(market.venue, market.symbol) || {
              venue: market.venue,
              symbol: market.symbol,
            };
            selectMarket(selected);
            await loadBars();
            startLivePolling();
            closeSettings();
          });

          settingsMarketRowsEl.appendChild(row);
        }
      }

      async function refreshSettingsMarkets() {
        const venue = normalizeVenueInput(settingsVenueSelectEl.value);
        if (!venue) {
          state.settingsMarkets = [];
          renderSettingsMarkets();
          return;
        }
        state.settingsMarkets = await fetchVenueMarkets(venue);
        renderSettingsMarkets();
      }

      async function openSettings() {
        settingsOverlayEl.classList.remove("hidden");
        state.settingsVenues = await fetchVenueList();
        renderSettingsVenues();
        if (state.settingsVenues.length && !settingsVenueSelectEl.value) {
          settingsVenueSelectEl.value = state.settingsVenues[0];
        }
        await refreshSettingsMarkets();
      }

      function closeSettings() {
        settingsOverlayEl.classList.add("hidden");
      }

      async function loadMarkets() {
        setStatus("Loading instruments...");
        let payload = await getJson(`/api/v1/markets/available?timeframe=${encodeURIComponent(state.timeframe)}`);
        let markets = payload.markets || [];

        if (!markets.length && state.timeframe !== "1m") {
          payload = await getJson("/api/v1/markets/available?timeframe=1m");
          markets = payload.markets || [];
        }

        state.markets = markets;

        if (state.selected) {
          state.selected = getSelectedMarket(state.selected.venue, state.selected.symbol);
        }

        renderMarketSelector();
      }

      async function loadBars() {
        if (!state.selected) {
          if (chart) replaceChartData([]);
          setStatus("No data");
          return;
        }

        state.autoFollowRealtime = true;
        syncRealtimeButtonState();
        state.hasMoreHistory = true;
        clearManualYAxisRange();

        setStatus("Loading candles...");
        let bars = await fetchBars(state.selected.venue, state.selected.symbol, state.timeframe, 700);

        let derivedFromOneMinute = false;
        if (!bars.length && state.timeframe !== "1m") {
          const ratio = Math.max(1, Math.round(timeframeToMs(state.timeframe) / 60_000));
          const oneMinuteLimit = Math.min(3000, 700 * ratio);
          const oneMinuteBars = await fetchBars(state.selected.venue, state.selected.symbol, "1m", oneMinuteLimit);
          bars = aggregateBarsFromLowerTf(oneMinuteBars, state.timeframe).slice(-700);
          derivedFromOneMinute = bars.length > 0;
        }

        state.derivedFromOneMinute = derivedFromOneMinute;
        state.persistedBars = bars;
        state.liveBars = bars.map((b) => ({ ...b }));

        const tfMs = timeframeToMs(state.timeframe);
        state.liveCursorMs = bars.length ? bars[bars.length - 1].timestamp : Date.now() - tfMs;

        if (!chart) {
          setStatus("Chart is not initialized");
          return;
        }

        if (!replaceChartData(state.liveBars)) {
          setStatus("Chart data API unavailable");
          return;
        }

        applySymbolPrecision();
        // Reset to instrument-specific vertical scale every symbol/timeframe load.
        setYAxisRangeFromBars(state.liveBars, "auto");
        if (typeof chart.scrollToRealTime === "function") {
          chart.scrollToRealTime(120);
        }
        syncMeta();

        if (derivedFromOneMinute) {
          setStatus(`${state.liveBars.length} candles · derived from 1m`);
        } else {
          setStatus(`${state.liveBars.length} candles · live on`);
        }
      }

      async function reloadAll() {
        try {
          await loadMarkets();
          await loadBars();
        } catch (error) {
          setStatus(`Error: ${error.message}`);
        }
      }

      function jumpToRealtime() {
        if (!chart || typeof chart.scrollToRealTime !== "function") return;
        state.autoFollowRealtime = true;
        syncRealtimeButtonState();
        chart.scrollToRealTime(180);
        if (state.liveBars.length && typeof chart.executeAction === "function") {
          const last = state.liveBars[state.liveBars.length - 1];
          chart.executeAction("onCrosshairChange", { timestamp: Math.floor(last.timestamp / 1000) });
        }
        syncMeta();
      }

      function exportSnapshot() {
        if (!chart || typeof chart.getConvertPictureUrl !== "function") {
          setStatus("Snapshot API unavailable");
          return;
        }
        const url = chart.getConvertPictureUrl(false, "png", "#131722");
        const a = document.createElement("a");
        a.href = url;
        a.download = `nitra-${state.selected ? state.selected.symbol : "chart"}-${Date.now()}.png`;
        document.body.appendChild(a);
        a.click();
        document.body.removeChild(a);
        setStatus("Snapshot exported");
      }

      async function jumpToTimestamp() {
        if (!chart || !jumpTimeEl.value) return;
        const targetMs = new Date(jumpTimeEl.value).getTime();
        if (!Number.isFinite(targetMs)) return;
        state.autoFollowRealtime = false;
        syncRealtimeButtonState();
        if (typeof chart.scrollToTimestamp === "function") {
          chart.scrollToTimestamp(Math.floor(targetMs / 1000), 160);
        }
        if (typeof chart.zoomAtTimestamp === "function") {
          chart.zoomAtTimestamp(1.2, Math.floor(targetMs / 1000), 120);
        }
        syncMeta();
      }

      function jumpToDataIndex() {
        if (!chart) return;
        const idx = Number(jumpIndexEl.value);
        if (!Number.isFinite(idx)) return;
        state.autoFollowRealtime = false;
        syncRealtimeButtonState();
        if (typeof chart.scrollToDataIndex === "function") {
          chart.scrollToDataIndex(idx, 160);
        }
        syncMeta();
      }

      function subscribeChartActions() {
        if (!chart || typeof chart.subscribeAction !== "function") return;

        chart.subscribeAction("onVisibleRangeChange", (payload) => {
          const nearRealtime = isNearRealtimeEdge(payload);
          if (nearRealtime !== state.autoFollowRealtime) {
            state.autoFollowRealtime = nearRealtime;
            syncRealtimeButtonState();
          }
          syncMeta(payload);
          if (state.lazyLoadDebounce) clearTimeout(state.lazyLoadDebounce);
          state.lazyLoadDebounce = setTimeout(() => {
            loadOlderBarsIfNeeded(payload);
          }, 120);
        });

        chart.subscribeAction("onScroll", () => {
          state.autoFollowRealtime = false;
          syncRealtimeButtonState();
          syncMeta();
        });

        chart.subscribeAction("onZoom", () => {
          syncMeta();
        });

        chart.subscribeAction("onCrosshairChange", (payload) => {
          if (!payload || typeof payload !== "object") return;
          const timestamp = payload.timestamp || payload.kLineData?.timestamp;
          const close = payload.kLineData?.close;
          if (timestamp) {
            const dt = new Date(Number(timestamp) * 1000);
            const closeText = Number.isFinite(Number(close)) ? ` close:${Number(close).toFixed(6)}` : "";
            metaEl.textContent = `${metaEl.textContent.split("|")[0]} | cursor:${dt.toISOString()}${closeText}`;
          }
        });
      }

      function bindPointerInspector() {
        if (!chart || typeof chart.convertFromPixel !== "function") return;
        const dom = document.getElementById("kline");
        dom.addEventListener("mousemove", (event) => {
          const rect = dom.getBoundingClientRect();
          const x = event.clientX - rect.left;
          const y = event.clientY - rect.top;
          const point = chart.convertFromPixel({ x, y });
          if (point && typeof point === "object") {
            const idx = point.dataIndex ?? "-";
            const val = point.value !== undefined ? Number(point.value).toFixed(6) : "-";
            const ts = point.timestamp ? new Date(Number(point.timestamp) * 1000).toISOString() : "-";
            setStatus(`x:${Math.round(x)} y:${Math.round(y)} idx:${idx} val:${val} ts:${ts}`);
          }
        });

        dom.addEventListener("dblclick", (event) => {
          const rect = dom.getBoundingClientRect();
          const x = event.clientX - rect.left;
          const inRightPriceAxis = x >= rect.width * 0.88;
          if (!inRightPriceAxis) {
            return;
          }
          event.preventDefault();
          fitVisibleCandlesVertically();
        });
      }

      marketSearchEl.addEventListener("input", () => openMarketDropdown(false));
      marketSearchEl.addEventListener("focus", () => openMarketDropdown(true));
      marketSearchEl.addEventListener("click", () => {
        if (!state.comboOpen) openMarketDropdown(true);
      });

      marketToggleEl.addEventListener("click", (event) => {
        event.preventDefault();
        if (state.comboOpen) closeMarketDropdown();
        else openMarketDropdown(true);
      });

      marketSearchEl.addEventListener("change", async () => {
        const next = selectedMarketFromInput();
        if (!next) {
          marketSearchEl.value = state.selected ? formatMarket(state.selected) : "";
          return;
        }
        selectMarket(next);
        closeMarketDropdown();
        await loadBars();
        startLivePolling();
      });

      marketSearchEl.addEventListener("keydown", async (event) => {
        if (event.key !== "Enter") return;
        const next = selectedMarketFromInput();
        if (!next) return;
        event.preventDefault();
        selectMarket(next);
        closeMarketDropdown();
        await loadBars();
        startLivePolling();
      });

      document.addEventListener("click", (event) => {
        if (!marketComboEl.contains(event.target)) closeMarketDropdown();
      });

      timeframeSelectEl.addEventListener("change", async () => {
        const tf = timeframeSelectEl.value;
        if (!tf || tf === state.timeframe) return;
        setActiveTimeframe(tf);
        await reloadAll();
        startLivePolling();
      });

      localeSelectEl.addEventListener("change", () => {
        state.locale = localeSelectEl.value;
        applyChartPreferences();
        persistUiPrefs();
      });

      timezoneSelectEl.addEventListener("change", () => {
        state.timezone = timezoneSelectEl.value;
        applyChartPreferences();
        persistUiPrefs();
      });

      zoomAnchorSelectEl.addEventListener("change", () => {
        state.zoomAnchor = zoomAnchorSelectEl.value;
        applyChartPreferences();
        persistUiPrefs();
      });

      formatSelectEl.addEventListener("change", () => {
        state.formatMode = formatSelectEl.value;
        applyFormatting();
        persistUiPrefs();
      });

      lockScrollBtn.addEventListener("click", () => {
        state.scrollEnabled = !state.scrollEnabled;
        applyChartPreferences();
      });

      lockZoomBtn.addEventListener("click", () => {
        state.zoomEnabled = !state.zoomEnabled;
        applyChartPreferences();
      });

      barSpaceRangeEl.addEventListener("input", () => {
        state.barSpace = Number(barSpaceRangeEl.value);
        applyChartPreferences();
      });

      rightOffsetRangeEl.addEventListener("input", () => {
        state.rightOffset = Number(rightOffsetRangeEl.value);
        applyChartPreferences();
      });

      leftMinBarsEl.addEventListener("change", () => {
        state.leftMinBars = Math.max(0, Number(leftMinBarsEl.value || 0));
        applyChartPreferences();
      });

      rightMinBarsEl.addEventListener("change", () => {
        state.rightMinBars = Math.max(0, Number(rightMinBarsEl.value || 0));
        applyChartPreferences();
      });

      reloadBtn.addEventListener("click", async () => {
        await reloadAll();
        startLivePolling();
      });

      fitBtn.addEventListener("click", () => {
        fitChart();
      });

      realtimeBtn.addEventListener("click", () => {
        jumpToRealtime();
      });

      snapshotBtn.addEventListener("click", () => {
        exportSnapshot();
      });

      jumpTimeBtn.addEventListener("click", async () => {
        await jumpToTimestamp();
      });

      jumpIndexBtn.addEventListener("click", () => {
        jumpToDataIndex();
      });

      backfillBtn.addEventListener("click", async () => {
        if (!state.selected) {
          setStatus("No market selected");
          return;
        }
        const old = backfillBtn.textContent;
        backfillBtn.disabled = true;
        backfillBtn.textContent = "Backfilling...";
        try {
          const response = await fetch("/api/v1/backfill/90d", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({
              venue: state.selected.venue,
              symbol: state.selected.symbol,
            }),
          });
          if (!response.ok) throw new Error(`HTTP ${response.status}`);
          const payload = await response.json();
          await loadBars();
          if (payload.complete_90d_1m) {
            setStatus(`backfill complete · 90d OK · ticks:${payload.source_tick_count} · venue_rows:${payload.venue_rows_fetched}`);
          } else {
            const missing = payload.missing_after_fetch_count ?? "?";
            setStatus(`backfill incomplete · missing:${missing}m · venue_err:${payload.venue_fetch_error || "none"}`);
          }
        } catch (error) {
          setStatus(`Backfill error: ${error.message}`);
        } finally {
          backfillBtn.disabled = false;
          backfillBtn.textContent = old;
        }
      });

      settingsBtn.addEventListener("click", async () => {
        try {
          await openSettings();
        } catch (error) {
          setStatus(`Settings load failed: ${error.message}`);
        }
      });

      settingsCloseBtn.addEventListener("click", () => {
        closeSettings();
      });

      settingsOverlayEl.addEventListener("click", (event) => {
        if (event.target === settingsOverlayEl) {
          closeSettings();
        }
      });

      settingsVenueSelectEl.addEventListener("change", async () => {
        await refreshSettingsMarkets();
      });

      addVenueBtn.addEventListener("click", async () => {
        const venue = normalizeVenueInput(newVenueInputEl.value);
        if (!venue) return;
        try {
          const response = await fetch("/api/v1/venues", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify(venue),
          });
          if (!response.ok) throw new Error(`HTTP ${response.status}`);
          newVenueInputEl.value = "";
          state.settingsVenues = await fetchVenueList();
          renderSettingsVenues();
          settingsVenueSelectEl.value = venue;
          await refreshSettingsMarkets();
          setStatus(`Venue saved: ${venue}`);
        } catch (error) {
          setStatus(`Add venue failed: ${error.message}`);
        }
      });

      addMarketBtn.addEventListener("click", async () => {
        const venue = normalizeVenueInput(settingsVenueSelectEl.value);
        const symbol = normalizeSymbolInput(newMarketSymbolInputEl.value);
        const assetClass = String(newMarketAssetSelectEl.value || "fx").toLowerCase();
        if (!venue || !symbol) return;
        try {
          const response = await fetch(`/api/v1/venues/${encodeURIComponent(venue)}/markets`, {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({
              symbol,
              asset_class: assetClass,
              enabled: true,
              ingest_enabled: true,
            }),
          });
          if (!response.ok) throw new Error(`HTTP ${response.status}`);
          newMarketSymbolInputEl.value = "";
          await refreshSettingsMarkets();
          await loadMarkets();
          setStatus(`Market saved: ${symbol} · ${venue}`);
        } catch (error) {
          setStatus(`Add market failed: ${error.message}`);
        }
      });

      window.addEventListener("resize", () => fitChart());

      applyUiPrefs();
      setActiveTimeframe(state.timeframe);
      syncRealtimeButtonState();
      if (initChart()) {
        bindPointerInspector();
        reloadAll().then(startLivePolling);
      }
    </script>
  </body>
</html>

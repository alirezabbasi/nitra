<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>NITRA Charting</title>
    <script src="/static/vendor-klinecharts.min.js"></script>
    <style>
      :root {
        --bg: #131722;
        --panel: #1b2130;
        --panel-soft: #1f2638;
        --line: #2b3245;
        --text: #d1d4dc;
        --muted: #7f8697;
      }

      * {
        box-sizing: border-box;
      }

      html,
      body {
        margin: 0;
        width: 100%;
        height: 100%;
        overflow: hidden;
        background: var(--bg);
        color: var(--text);
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Ubuntu, "Helvetica Neue", Arial, sans-serif;
      }

      .app {
        width: 100%;
        height: 100%;
        display: grid;
        grid-template-rows: 48px 1fr;
      }

      .topbar {
        display: flex;
        align-items: center;
        gap: 8px;
        padding: 0 10px;
        border-bottom: 1px solid var(--line);
        background: var(--panel);
      }

      .brand {
        font-size: 13px;
        font-weight: 700;
        letter-spacing: 0.02em;
        color: #e7ebf4;
        padding: 0 10px;
      }

      .tool-group {
        display: flex;
        align-items: center;
        gap: 4px;
      }

      .divider {
        width: 1px;
        height: 20px;
        background: var(--line);
        margin: 0 6px;
      }

      .tool-btn,
      .select {
        border: 1px solid transparent;
        color: var(--muted);
        background: transparent;
        border-radius: 6px;
        height: 30px;
        min-width: 30px;
        padding: 0 10px;
        font-size: 12px;
      }

      .tool-btn {
        cursor: pointer;
      }

      .select {
        min-width: 220px;
        border-color: #3a4660;
        background: #27324a;
        color: #e3e7f0;
      }

      #timeframe-select {
        min-width: 0;
        width: 8ch;
        padding-left: 8px;
        padding-right: 18px;
      }

      .combo {
        position: relative;
        display: flex;
        align-items: center;
        min-width: 260px;
      }

      .combo .select {
        width: 100%;
        min-width: 0;
        border-top-right-radius: 0;
        border-bottom-right-radius: 0;
      }

      .combo-toggle {
        border: 1px solid #3a4660;
        border-left: 0;
        color: #e3e7f0;
        background: #27324a;
        border-top-right-radius: 6px;
        border-bottom-right-radius: 6px;
        height: 30px;
        min-width: 28px;
        cursor: pointer;
      }

      .combo-menu {
        position: absolute;
        top: calc(100% + 4px);
        left: 0;
        right: 0;
        background: #1f2638;
        border: 1px solid #3a4660;
        border-radius: 6px;
        max-height: 260px;
        overflow: auto;
        z-index: 30;
      }

      .combo-menu.hidden {
        display: none;
      }

      .combo-item {
        width: 100%;
        border: 0;
        background: transparent;
        color: #e3e7f0;
        text-align: left;
        padding: 8px 10px;
        cursor: pointer;
        font-size: 12px;
      }

      .combo-item:hover,
      .combo-item.active {
        background: #27324a;
      }

      .combo-empty {
        padding: 8px 10px;
        color: var(--muted);
        font-size: 12px;
      }

      .tool-btn:hover {
        background: #252d3f;
        color: var(--text);
      }

      .tool-btn.active {
        background: #27324a;
        color: #e3e7f0;
        border-color: #3a4660;
      }

      .chart-wrap {
        min-height: 0;
        display: block;
      }

      .live-status {
        margin-left: auto;
        color: var(--muted);
        font-size: 12px;
        white-space: nowrap;
      }

      #kline {
        width: 100%;
        height: 100%;
      }

      @media (max-width: 980px) {
        .brand {
          display: none;
        }

        .select {
          min-width: 150px;
          max-width: 170px;
        }
      }
    </style>
  </head>
  <body>
    <div class="app">
      <div class="topbar">
        <div class="brand">NITRA · KLine</div>
        <div class="divider"></div>
        <div class="tool-group combo" id="market-combo">
          <input id="market-search" class="select" title="Search Venue · Instrument" placeholder="Search venue/instrument" autocomplete="off" />
          <button class="combo-toggle" id="market-toggle" title="Show available markets">▼</button>
          <div id="market-dropdown" class="combo-menu hidden"></div>
        </div>
        <div class="divider"></div>
        <div class="tool-group">
          <select id="timeframe-select" class="select" title="Timeframe">
            <option value="1m">1m</option>
            <option value="5m">5m</option>
            <option value="15m">15m</option>
            <option value="30m">30m</option>
            <option value="1h">1h</option>
            <option value="4h">4h</option>
            <option value="1d">1d</option>
          </select>
        </div>
        <div class="divider"></div>
        <div class="tool-group">
          <button class="tool-btn" id="reload-btn">Reload</button>
          <button class="tool-btn" id="fit-btn">Fit</button>
          <button class="tool-btn" id="backfill-btn">Backfill 90d</button>
        </div>
        <div id="status" class="live-status">Loading...</div>
      </div>

      <section class="chart-wrap">
        <div id="kline"></div>
      </section>
    </div>

    <script>
      const marketSearchEl = document.getElementById("market-search");
      const marketToggleEl = document.getElementById("market-toggle");
      const marketDropdownEl = document.getElementById("market-dropdown");
      const marketComboEl = document.getElementById("market-combo");
      const statusEl = document.getElementById("status");
      const reloadBtn = document.getElementById("reload-btn");
      const fitBtn = document.getElementById("fit-btn");
      const backfillBtn = document.getElementById("backfill-btn");
      const timeframeSelectEl = document.getElementById("timeframe-select");

      const state = {
        timeframe: "1m",
        markets: [],
        selected: null,
        comboOpen: false,
        persistedBars: [],
        liveBars: [],
        liveCursorMs: null,
        liveTimer: null,
        liveInFlight: false,
      };

      let chart = null;

      function setStatus(text) {
        statusEl.textContent = text;
      }

      function initChart() {
        if (!window.klinecharts || typeof window.klinecharts.init !== "function") {
          setStatus("Chart library failed to load");
          return false;
        }

        chart = window.klinecharts.init("kline", {
          styles: {
            grid: {
              horizontal: { color: "#2a3041" },
              vertical: { color: "#2a3041" },
            },
            candle: {
              bar: {
                upColor: "#26a69a",
                downColor: "#ef5350",
                upBorderColor: "#26a69a",
                downBorderColor: "#ef5350",
                upWickColor: "#26a69a",
                downWickColor: "#ef5350",
              },
            },
            xAxis: {
              axisLine: { color: "#3c4357" },
              tickText: { color: "#8f98aa" },
            },
            yAxis: {
              axisLine: { color: "#3c4357" },
              tickText: { color: "#8f98aa" },
            },
            separator: {
              color: "#2c3244",
            },
            crosshair: {
              horizontal: { line: { color: "#7583a5" }, text: { backgroundColor: "#414c69" } },
              vertical: { line: { color: "#7583a5" }, text: { backgroundColor: "#414c69" } },
            },
          },
        });
        return true;
      }

      function replaceChartData(bars) {
        if (!chart) {
          return false;
        }
        if (typeof chart.applyNewData === "function") {
          chart.applyNewData(bars);
          return true;
        }
        if (typeof chart.setData === "function") {
          chart.setData(bars);
          return true;
        }
        return false;
      }

      function formatMarket(market) {
        return `${market.symbol} · ${market.venue.toUpperCase()}`;
      }

      function timeframeToMs(tf) {
        const m = /^(\d+)([mhd])$/.exec(tf || "");
        if (!m) return 60_000;
        const value = Number(m[1]);
        const unit = m[2];
        if (unit === "m") return value * 60_000;
        if (unit === "h") return value * 3_600_000;
        if (unit === "d") return value * 86_400_000;
        return 60_000;
      }

      function bucketStartMs(tsMs, tfMs) {
        return Math.floor(tsMs / tfMs) * tfMs;
      }

      function aggregateBarsFromLowerTf(bars, targetTf) {
        if (!bars.length || targetTf === "1m") {
          return bars.map((b) => ({ ...b }));
        }
        const tfMs = timeframeToMs(targetTf);
        const grouped = [];
        let current = null;

        for (const bar of bars) {
          const bucketTs = bucketStartMs(bar.timestamp, tfMs);
          if (!current || current.timestamp !== bucketTs) {
            if (current) {
              grouped.push(current);
            }
            current = {
              timestamp: bucketTs,
              open: bar.open,
              high: bar.high,
              low: bar.low,
              close: bar.close,
              volume: Number(bar.volume || 0),
            };
            continue;
          }

          current.high = Math.max(current.high, bar.high);
          current.low = Math.min(current.low, bar.low);
          current.close = bar.close;
          current.volume += Number(bar.volume || 0);
        }

        if (current) {
          grouped.push(current);
        }
        return grouped;
      }

      function fitChart() {
        if (!chart) {
          return;
        }
        if (typeof chart.resize === "function") {
          chart.resize();
        }
        if (typeof chart.scrollToRealTime === "function") {
          chart.scrollToRealTime();
        }
      }

      function stopLivePolling() {
        if (state.liveTimer) {
          clearInterval(state.liveTimer);
          state.liveTimer = null;
        }
        state.liveInFlight = false;
      }

      function mergeBarsWithTicks(baseBars, ticks, tfMs, persistedLastTs) {
        const bars = baseBars.map((b) => ({ ...b }));
        if (!ticks.length) {
          return bars;
        }

        for (const tick of ticks) {
          const tickTs = Number(tick.ts_ms);
          const price = Number(tick.price);
          if (!Number.isFinite(tickTs) || !Number.isFinite(price)) {
            continue;
          }

          const bucketTs = bucketStartMs(tickTs, tfMs);

          if (persistedLastTs !== null && bucketTs < persistedLastTs) {
            continue;
          }

          if (!bars.length) {
            bars.push({
              timestamp: bucketTs,
              open: price,
              high: price,
              low: price,
              close: price,
              volume: 0,
            });
            continue;
          }

          const last = bars[bars.length - 1];
          if (bucketTs < last.timestamp) {
            continue;
          }

          if (bucketTs === last.timestamp) {
            last.high = Math.max(last.high, price);
            last.low = Math.min(last.low, price);
            last.close = price;
            continue;
          }

          bars.push({
            timestamp: bucketTs,
            open: last.close,
            high: Math.max(last.close, price),
            low: Math.min(last.close, price),
            close: price,
            volume: 0,
          });
        }

        return bars;
      }

      async function pollLiveTicks() {
        if (!state.selected || !chart || state.liveInFlight) {
          return;
        }
        state.liveInFlight = true;
        try {
          const params = new URLSearchParams({
            venue: state.selected.venue,
            symbol: state.selected.symbol,
            limit: "2000",
          });

          if (state.liveCursorMs !== null) {
            params.set("since_ms", String(state.liveCursorMs));
          }

          const payload = await getJson(`/api/v1/ticks/hot?${params.toString()}`);
          const ticks = payload.ticks || [];
          if (!ticks.length) {
            return;
          }

          state.liveCursorMs = Number(ticks[ticks.length - 1].ts_ms);
          const tfMs = timeframeToMs(state.timeframe);
          const persistedLastTs = state.persistedBars.length ? state.persistedBars[state.persistedBars.length - 1].timestamp : null;

          state.liveBars = mergeBarsWithTicks(state.liveBars, ticks, tfMs, persistedLastTs);

          if (replaceChartData(state.liveBars)) {
            fitChart();
            setStatus(`live ticks:${ticks.length} · ${new Date().toLocaleTimeString()}`);
          }
        } catch (error) {
          setStatus(`Live error: ${error.message}`);
        } finally {
          state.liveInFlight = false;
        }
      }

      function startLivePolling() {
        stopLivePolling();
        pollLiveTicks();
        state.liveTimer = setInterval(pollLiveTicks, 1000);
      }

      async function getJson(url) {
        const response = await fetch(url);
        if (!response.ok) {
          throw new Error(`HTTP ${response.status}`);
        }
        return response.json();
      }

      async function fetchBars(venue, symbol, timeframe, limit) {
        const params = new URLSearchParams({
          venue,
          symbol,
          timeframe,
          limit: String(limit),
        });
        const payload = await getJson(`/api/v1/bars/hot?${params.toString()}`);
        return (payload.bars || []).map((b) => ({
          timestamp: Number(b.time) * 1000,
          open: Number(b.open),
          high: Number(b.high),
          low: Number(b.low),
          close: Number(b.close),
          volume: Number(b.volume || 0),
        }));
      }

      function setActiveTimeframe(tf) {
        state.timeframe = tf;
        timeframeSelectEl.value = tf;
      }

      function getSelectedMarket(venue, symbol) {
        return state.markets.find((m) => m.venue === venue && m.symbol === symbol) || null;
      }

      function marketKey(market) {
        return `${market.venue}::${market.symbol}`;
      }

      function getSelectedMarketByKey(key) {
        if (!key) return null;
        const [venue, symbol] = key.split("::");
        if (!venue || !symbol) return null;
        return getSelectedMarket(venue, symbol);
      }

      function openMarketDropdown(showAll = false) {
        if (!state.markets.length) {
          marketDropdownEl.classList.add("hidden");
          state.comboOpen = false;
          return;
        }
        state.comboOpen = true;
        marketDropdownEl.classList.remove("hidden");
        renderMarketDropdown(showAll ? "" : marketSearchEl.value);
      }

      function closeMarketDropdown() {
        state.comboOpen = false;
        marketDropdownEl.classList.add("hidden");
      }

      function filterMarkets(queryText) {
        const query = (queryText || "").trim().toLowerCase();
        const markets = [...state.markets].sort((a, b) => {
          const s = a.symbol.localeCompare(b.symbol);
          if (s !== 0) return s;
          return a.venue.localeCompare(b.venue);
        });
        if (!query) {
          return markets;
        }
        return markets.filter((m) => formatMarket(m).toLowerCase().includes(query));
      }

      function selectMarket(market) {
        state.selected = market;
        marketSearchEl.value = formatMarket(market);
      }

      function renderMarketDropdown(queryText = "") {
        marketDropdownEl.innerHTML = "";
        const filtered = filterMarkets(queryText);
        if (!filtered.length) {
          const empty = document.createElement("div");
          empty.className = "combo-empty";
          empty.textContent = "No matching market";
          marketDropdownEl.appendChild(empty);
          return;
        }

        for (const market of filtered) {
          const btn = document.createElement("button");
          btn.type = "button";
          btn.className = "combo-item";
          if (state.selected && state.selected.venue === market.venue && state.selected.symbol === market.symbol) {
            btn.classList.add("active");
          }
          btn.textContent = formatMarket(market);
          btn.addEventListener("click", async () => {
            selectMarket(market);
            closeMarketDropdown();
            await loadBars();
            startLivePolling();
          });
          marketDropdownEl.appendChild(btn);
        }
      }

      function renderMarketSelector() {
        if (!state.markets.length) {
          marketSearchEl.value = "";
          marketSearchEl.placeholder = "No market";
          state.selected = null;
          closeMarketDropdown();
          return;
        }

        marketSearchEl.placeholder = "Search venue/instrument";
        const filteredAll = filterMarkets("");
        const existing = state.selected ? getSelectedMarket(state.selected.venue, state.selected.symbol) : null;
        state.selected = existing || filteredAll[0];
        marketSearchEl.value = state.selected ? formatMarket(state.selected) : "";
        if (state.comboOpen) {
          renderMarketDropdown(marketSearchEl.value);
        }
      }

      function selectedMarketFromInput() {
        const label = marketSearchEl.value.trim().toLowerCase();
        if (!label) return null;
        const matches = state.markets.filter((m) => formatMarket(m).toLowerCase() === label);
        return matches[0] || null;
      }

      async function loadMarkets() {
        setStatus("Loading instruments...");
        let payload = await getJson(`/api/v1/markets/available?timeframe=${encodeURIComponent(state.timeframe)}`);
        let markets = payload.markets || [];

        if (!markets.length && state.timeframe !== "1m") {
          payload = await getJson("/api/v1/markets/available?timeframe=1m");
          markets = payload.markets || [];
        }

        state.markets = markets;

        if (state.selected) {
          state.selected = getSelectedMarket(state.selected.venue, state.selected.symbol);
        }

        renderMarketSelector();
      }

      async function loadBars() {
        if (!state.selected) {
          if (chart) {
            replaceChartData([]);
          }
          setStatus("No data");
          return;
        }

        setStatus("Loading candles...");
        let bars = await fetchBars(state.selected.venue, state.selected.symbol, state.timeframe, 500);
        let derivedFromOneMinute = false;
        if (!bars.length && state.timeframe !== "1m") {
          const ratio = Math.max(1, Math.round(timeframeToMs(state.timeframe) / 60_000));
          const oneMinuteLimit = Math.min(3000, 500 * ratio);
          const oneMinuteBars = await fetchBars(state.selected.venue, state.selected.symbol, "1m", oneMinuteLimit);
          bars = aggregateBarsFromLowerTf(oneMinuteBars, state.timeframe).slice(-500);
          derivedFromOneMinute = bars.length > 0;
        }

        state.persistedBars = bars;
        state.liveBars = bars.map((b) => ({ ...b }));

        const tfMs = timeframeToMs(state.timeframe);
        if (bars.length) {
          state.liveCursorMs = bars[bars.length - 1].timestamp;
        } else {
          state.liveCursorMs = Date.now() - tfMs;
        }

        if (!chart) {
          setStatus("Chart is not initialized");
          return;
        }

        if (!replaceChartData(state.liveBars)) {
          setStatus("Chart data API unavailable");
          return;
        }

        fitChart();
        if (derivedFromOneMinute) {
          setStatus(`${state.liveBars.length} candles · live on · derived from 1m`);
        } else {
          setStatus(`${state.liveBars.length} candles · live on`);
        }
      }

      async function reloadAll() {
        try {
          await loadMarkets();
          await loadBars();
        } catch (error) {
          setStatus(`Error: ${error.message}`);
        }
      }

      marketSearchEl.addEventListener("input", () => {
        openMarketDropdown(false);
      });

      marketSearchEl.addEventListener("focus", () => {
        openMarketDropdown(true);
      });

      marketSearchEl.addEventListener("click", () => {
        if (!state.comboOpen) {
          openMarketDropdown(true);
        }
      });

      marketToggleEl.addEventListener("click", (event) => {
        event.preventDefault();
        if (state.comboOpen) {
          closeMarketDropdown();
        } else {
          openMarketDropdown(true);
        }
      });

      marketSearchEl.addEventListener("change", async () => {
        const next = selectedMarketFromInput();
        if (!next) {
          marketSearchEl.value = state.selected ? formatMarket(state.selected) : "";
          return;
        }
        selectMarket(next);
        closeMarketDropdown();
        await loadBars();
        startLivePolling();
      });

      marketSearchEl.addEventListener("keydown", async (event) => {
        if (event.key !== "Enter") return;
        const next = selectedMarketFromInput();
        if (!next) return;
        event.preventDefault();
        selectMarket(next);
        closeMarketDropdown();
        await loadBars();
        startLivePolling();
      });

      document.addEventListener("click", (event) => {
        if (!marketComboEl.contains(event.target)) {
          closeMarketDropdown();
        }
      });

      timeframeSelectEl.addEventListener("change", async () => {
        const tf = timeframeSelectEl.value;
        if (!tf || tf === state.timeframe) return;
        setActiveTimeframe(tf);
        await reloadAll();
        startLivePolling();
      });

      reloadBtn.addEventListener("click", async () => {
        await reloadAll();
        startLivePolling();
      });

      fitBtn.addEventListener("click", () => {
        fitChart();
      });

      backfillBtn.addEventListener("click", async () => {
        if (!state.selected) {
          setStatus("No market selected");
          return;
        }
        const old = backfillBtn.textContent;
        backfillBtn.disabled = true;
        backfillBtn.textContent = "Backfilling...";
        try {
          const response = await fetch("/api/v1/backfill/90d", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({
              venue: state.selected.venue,
              symbol: state.selected.symbol,
            }),
          });
          if (!response.ok) {
            throw new Error(`HTTP ${response.status}`);
          }
          const payload = await response.json();
          await loadBars();
          fitChart();
          if (payload.complete_90d_1m) {
            setStatus(
              `backfill complete · 90d OK · ticks:${payload.source_tick_count} · venue_rows:${payload.venue_rows_fetched}`
            );
          } else {
            const missing = payload.missing_after_fetch_count ?? "?";
            setStatus(
              `backfill incomplete · missing:${missing}m · venue_err:${payload.venue_fetch_error || "none"}`
            );
          }
        } catch (error) {
          setStatus(`Backfill error: ${error.message}`);
        } finally {
          backfillBtn.disabled = false;
          backfillBtn.textContent = old;
        }
      });

      window.addEventListener("resize", () => {
        fitChart();
      });

      setActiveTimeframe("1m");
      if (initChart()) {
        reloadAll().then(startLivePolling);
      }
    </script>
  </body>
</html>
